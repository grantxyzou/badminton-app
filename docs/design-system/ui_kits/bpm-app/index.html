<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BPM Badminton — UI kit — Dark + Light</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #0a0a0a; font-family: var(--font-sans); color: #e2e8f0; min-height: 100vh; }

    .wrap { max-width: 1280px; margin: 0 auto; padding: 28px 24px 40px; }

    .head { display: flex; justify-content: space-between; align-items: flex-end; padding-bottom: 18px; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 20px; gap: 20px; flex-wrap: wrap; }
    .head h1 { margin: 0; font-family: var(--font-display); font-size: 22px; font-weight: 700; letter-spacing: -0.015em; color: #e2e8f0; }
    .head .sub { font-size: 12px; color: rgba(226,232,240,0.55); margin-top: 4px; max-width: 640px; }
    .head .view-single {
      font-size: 12px; color: #86efac; text-decoration: none;
      padding: 7px 12px; border-radius: 8px;
      background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.2);
      font-weight: 600; white-space: nowrap;
    }
    .head .view-single:hover { background: rgba(74,222,128,0.14); }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 920px) { .grid { grid-template-columns: 1fr; } }

    .pane { display: flex; flex-direction: column; }
    .pane-head {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; border-radius: 10px 10px 0 0;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-bottom: none;
    }
    .pane-head .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .pane-head.dark  .dot { background: #100F0F; border: 1px solid #4ade80; }
    .pane-head.light .dot { background: #FAF8F5; border: 1px solid #16a34a; }
    .pane-head .name { font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
    .pane-head.dark  .name { color: #86efac; }
    .pane-head.light .name { color: #16a34a; }
    .pane-head .meta { margin-left: auto; font-size: 11px; color: rgba(226,232,240,0.5); font-family: var(--font-mono); }

    .pane-frame {
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 0 0 10px 10px;
      overflow: hidden;
      background: #100F0F;
    }
    .pane-frame.light { background: #FAF8F5; }
    .pane-frame iframe {
      display: block;
      width: 100%;
      height: 900px;
      border: none;
    }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="head">
      <div>
        <h1>BPM Badminton — UI kit</h1>
        <div class="sub">The interactive app in both themes, side-by-side. Tap tabs, sign up, and the two panes behave independently (localStorage is namespaced per pane).</div>
      </div>
      <a class="view-single" href="./_app.html" target="_blank" rel="noopener">Open standalone →</a>
    </div>

    <div class="grid">

      <div class="pane">
        <div class="pane-head dark">
          <span class="dot"></span>
          <span class="name">Dark mode</span>
          <span class="meta">data-theme="dark" · #100F0F</span>
        </div>
        <div class="pane-frame">
          <iframe src="./_app.html?theme=dark&ns=dark" title="BPM Badminton — dark mode"></iframe>
        </div>
      </div>

      <div class="pane">
        <div class="pane-head light">
          <span class="dot"></span>
          <span class="name">Light mode</span>
          <span class="meta">data-theme="light" · #FAF8F5</span>
        </div>
        <div class="pane-frame light">
          <iframe src="./_app.html?theme=light&ns=light" title="BPM Badminton — light mode"></iframe>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
