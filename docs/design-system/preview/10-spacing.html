<!doctype html>
<html data-theme="dark">
<head>
<meta charset="utf-8">
<title>Spacing</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons&display=swap">
<link rel="stylesheet" href="_preview.css">
</head>
<body>
<div class="court-bg"><div class="aurora-blob-1"></div><div class="aurora-blob-2"></div><div class="aurora-blob-3"></div></div>
<div class="card-wrap">
<div class="col" style="padding:10px;gap:8px;">
  
    <div class="row" style="gap:14px;">
      <div style="width:4px;height:14px;background:var(--accent);border-radius:3px;flex-shrink:0;"></div>
      <div style="font-size:13px;color:var(--text-secondary);">4px · <span class="mono">space-1</span></div>
    </div>
    <div class="row" style="gap:14px;">
      <div style="width:8px;height:14px;background:var(--accent);border-radius:3px;flex-shrink:0;"></div>
      <div style="font-size:13px;color:var(--text-secondary);">8px · <span class="mono">space-2</span></div>
    </div>
    <div class="row" style="gap:14px;">
      <div style="width:12px;height:14px;background:var(--accent);border-radius:3px;flex-shrink:0;"></div>
      <div style="font-size:13px;color:var(--text-secondary);">12px · <span class="mono">space-3 · tile gap</span></div>
    </div>
    <div class="row" style="gap:14px;">
      <div style="width:16px;height:14px;background:var(--accent);border-radius:3px;flex-shrink:0;"></div>
      <div style="font-size:13px;color:var(--text-secondary);">16px · <span class="mono">space-4 · tile pad</span></div>
    </div>
    <div class="row" style="gap:14px;">
      <div style="width:20px;height:14px;background:var(--accent);border-radius:3px;flex-shrink:0;"></div>
      <div style="font-size:13px;color:var(--text-secondary);">20px · <span class="mono">space-5 · card pad · space-y</span></div>
    </div>
    <div class="row" style="gap:14px;">
      <div style="width:24px;height:14px;background:var(--accent);border-radius:3px;flex-shrink:0;"></div>
      <div style="font-size:13px;color:var(--text-secondary);">24px · <span class="mono">space-6</span></div>
    </div>
</div></div>
</body>
</html>
