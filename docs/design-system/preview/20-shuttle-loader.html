<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Shuttle loader — glass</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { font-family: var(--font-sans); min-height: 100%; }
  body { padding: 14px; background: #050806; display: flex; justify-content: center; }

  .dual { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 960px; }
  .pane { position: relative; padding: 28px 16px 22px; border-radius: 14px; border: 1px solid; overflow: hidden; }
  .pane[data-theme="dark"]  { background: #100F0F; border-color: rgba(255,255,255,0.08); color: #e2e8f0; }
  .pane[data-theme="light"] { background: #FAF8F5; border-color: rgba(0,0,0,0.08);   color: #1a2332; }

  .pane > * { position: relative; z-index: 1; }

  .pane-title {
    font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
    margin-bottom: 18px; display: flex; align-items: center; gap: 6px;
  }
  .pane[data-theme="dark"]  .pane-title { color: #86efac; }
  .pane[data-theme="light"] .pane-title { color: #16a34a; }
  .pane-title .dot { width: 8px; height: 8px; border-radius: 50%; }
  .pane[data-theme="dark"]  .pane-title .dot { background: #4ade80; }
  .pane[data-theme="light"] .pane-title .dot { background: #16a34a; }

  .loader-stack {
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    padding: 12px 0 4px;
  }

  .wave { display: flex; align-items: center; gap: 4px; height: 52px; }
  .bar {
    position: relative;
    width: 6px;
    border-radius: 3px;
    height: 4px;
    animation: smash 1.6s ease-in-out infinite;
    animation-delay: var(--delay, 0s);
  }
  .pane[data-theme="dark"] .bar {
    background: linear-gradient(180deg, rgba(134,239,172,0.55) 0%, rgba(74,222,128,0.28) 100%);
    border: 1px solid rgba(134,239,172,0.4);
  }
  .pane[data-theme="light"] .bar {
    background: linear-gradient(180deg, rgba(34,197,94,0.6) 0%, rgba(22,163,74,0.35) 100%);
    border: 1px solid rgba(22,163,74,0.4);
  }
  .bar::after { display: none; }
  @keyframes smash {
    0%, 100% { height: 4px; opacity: 0.3; }
    15%      { height: calc(var(--intensity,0.5) * 52px); opacity: 1; }
    40%      { height: calc(var(--intensity,0.5) * 22px); opacity: 0.6; }
    60%      { height: calc(var(--intensity,0.5) * 32px); opacity: 0.8; }
    80%      { height: 6px; opacity: 0.4; }
  }

  .cap { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.55; text-align: center; }
  .sub { font-size: 11px; opacity: 0.5; letter-spacing: 0.02em; text-align: center; }

  .wcag {
    margin-top: 14px; padding-top: 10px; border-top: 1px solid;
    font-size: 11px; font-family: var(--font-mono); line-height: 1.55;
  }
  .pane[data-theme="dark"]  .wcag { border-color: rgba(255,255,255,0.1); color: rgba(226,232,240,0.7); }
  .pane[data-theme="light"] .wcag { border-color: rgba(0,0,0,0.08);    color: rgba(26,35,50,0.72); }
  .wcag .pass { color: #16a34a; font-weight: 700; }
  .pane[data-theme="dark"] .wcag .pass { color: #86efac; }
</style>
</head>
<body>
<div class="dual">

  <div class="pane" data-theme="dark">
    <div class="pane-title"><span class="dot"></span>Dark</div>
    <div class="loader-stack">
      <div class="wave">
        <div class="bar" style="--intensity:0.15;--delay:0s;"></div>
        <div class="bar" style="--intensity:0.22;--delay:0.07s;"></div>
        <div class="bar" style="--intensity:0.32;--delay:0.14s;"></div>
        <div class="bar" style="--intensity:0.5;--delay:0.21s;"></div>
        <div class="bar" style="--intensity:0.75;--delay:0.28s;"></div>
        <div class="bar" style="--intensity:0.95;--delay:0.35s;"></div>
        <div class="bar" style="--intensity:1;--delay:0.42s;"></div>
        <div class="bar" style="--intensity:0.88;--delay:0.49s;"></div>
        <div class="bar" style="--intensity:0.6;--delay:0.56s;"></div>
        <div class="bar" style="--intensity:0.4;--delay:0.63s;"></div>
        <div class="bar" style="--intensity:0.28;--delay:0.70s;"></div>
        <div class="bar" style="--intensity:0.2;--delay:0.77s;"></div>
        <div class="bar" style="--intensity:0.15;--delay:0.84s;"></div>
      </div>
      <div class="cap">Smash wave</div>
      <div class="sub">Session loading · long task</div>
    </div>
    <div class="wcag">
      Solid bars on Night<br>
      Active bar peak <span class="pass">AAA</span> — decorative only
    </div>
  </div>

  <div class="pane" data-theme="light">
    <div class="pane-title"><span class="dot"></span>Light</div>
    <div class="loader-stack">
      <div class="wave">
        <div class="bar" style="--intensity:0.15;--delay:0s;"></div>
        <div class="bar" style="--intensity:0.22;--delay:0.07s;"></div>
        <div class="bar" style="--intensity:0.32;--delay:0.14s;"></div>
        <div class="bar" style="--intensity:0.5;--delay:0.21s;"></div>
        <div class="bar" style="--intensity:0.75;--delay:0.28s;"></div>
        <div class="bar" style="--intensity:0.95;--delay:0.35s;"></div>
        <div class="bar" style="--intensity:1;--delay:0.42s;"></div>
        <div class="bar" style="--intensity:0.88;--delay:0.49s;"></div>
        <div class="bar" style="--intensity:0.6;--delay:0.56s;"></div>
        <div class="bar" style="--intensity:0.4;--delay:0.63s;"></div>
        <div class="bar" style="--intensity:0.28;--delay:0.70s;"></div>
        <div class="bar" style="--intensity:0.2;--delay:0.77s;"></div>
        <div class="bar" style="--intensity:0.15;--delay:0.84s;"></div>
      </div>
      <div class="cap">Smash wave</div>
      <div class="sub">Session loading · long task</div>
    </div>
    <div class="wcag">
      Solid bars on cream<br>
      Active bar peak <span class="pass">AAA</span> — decorative only
    </div>
  </div>

</div>
</body>
</html>
