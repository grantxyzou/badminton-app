<!doctype html>
<html data-theme="dark">
<head>
<meta charset="utf-8">
<title>Type scale</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons&display=swap">
<link rel="stylesheet" href="_preview.css">
</head>
<body>
<div class="court-bg"><div class="aurora-blob-1"></div><div class="aurora-blob-2"></div><div class="aurora-blob-3"></div></div>
<div class="card-wrap">
<div class="col" style="gap:6px;padding:14px 6px;">
  <div style="font-family:var(--font-display);font-size:30px;font-weight:700;line-height:1.1;letter-spacing:-0.02em;">Aa · 30 / 700 · h1 · display</div>
  <div style="font-family:var(--font-display);font-size:24px;font-weight:700;line-height:1.2;letter-spacing:-0.015em;">Aa · 24 / 700 · h2 · display</div>
  <div style="font-family:var(--font-display);font-size:20px;font-weight:700;line-height:1.3;letter-spacing:-0.01em;color:var(--accent);">Aa · 20 / 700 · tab heading · display</div>
  <div style="font-family:var(--font-display);font-size:18px;font-weight:600;line-height:1.375;letter-spacing:-0.005em;">Aa · 18 / 600 · tile title · display</div>
  <div style="font-size:16px;font-weight:400;line-height:1.5;">Aa · 16 / 400 · body · IBM Plex Sans</div>
  <div style="font-size:14px;color:var(--text-secondary);">Aa · 14 / 400 · caption · IBM Plex Sans (accessibility-bumped)</div>
</div></div>
</body>
</html>
