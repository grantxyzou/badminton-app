name: Deploy to bpm-next (auto, on push to main)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /bpm
          # Canonical URL for SEO + social-share metadata. Swap when a custom
          # domain is wired up; everything else (basePath, env, flags)
          # stays the same.
          NEXT_PUBLIC_BASE_URL: https://vnext-badminton-app-enhcave5djcvafe9.canadacentral-01.azurewebsites.net/bpm
          NEXT_PUBLIC_MAX_PLAYERS: '12'
          NEXT_PUBLIC_ETRANSFER_EMAIL: grantxyzou@gmail.com
          NEXT_PUBLIC_ENV: next
          NEXT_PUBLIC_GIT_SHA: ${{ github.sha }}
          NEXT_PUBLIC_FLAG_DESIGN_PREVIEW: 'true'
          NEXT_PUBLIC_FLAG_COMMAND_CENTER: 'true'
          NEXT_PUBLIC_FLAG_SETTLE: 'true'
          NEXT_PUBLIC_FLAG_LEDGER: 'true'
          NEXT_PUBLIC_FLAG_VALUE_HUB_SLICE: 'true'
          NEXT_PUBLIC_FLAG_NAV_RAIL: 'true'
          NEXT_PUBLIC_FLAG_SKILL_ASSESS: 'true'
          NEXT_PUBLIC_FLAG_SKILL_LEVEL: 'true'
          NEXT_PUBLIC_FLAG_SKILL_CALIBRATION: 'true'
          NEXT_PUBLIC_FLAG_SKILL_SMOOTHING: 'true'
          NEXT_PUBLIC_FLAG_SKILL_DRILLS: 'true'
          NEXT_PUBLIC_FLAG_KUDOS: 'true'
          NEXT_PUBLIC_FLAG_INSIGHT_CARDS: 'true'

      - name: Package standalone build
        run: |
          # Next.js standalone output excludes .next/static and public/ —
          # both must be copied in manually before zipping.
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          cd .next/standalone
          zip -r ../../standalone-deploy.zip .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@2e64e04aaaeeec4396edcb982544dbd30f8e9ddf # v3
        with:
          app-name: 'vnext-badminton-app'
          slot-name: 'Production'
          package: standalone-deploy.zip
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_C63C5B445B514543BFF5CFA2959ABBD0 }}
