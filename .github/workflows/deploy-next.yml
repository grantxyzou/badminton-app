name: Deploy to bpm-next (auto, on push to main)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /bpm
          NEXT_PUBLIC_MAX_PLAYERS: '12'
          NEXT_PUBLIC_ETRANSFER_EMAIL: grantxyzou@gmail.com
          NEXT_PUBLIC_ENV: next
          NEXT_PUBLIC_GIT_SHA: ${{ github.sha }}

      - name: Package standalone build
        run: |
          cp -r .next/static .next/standalone/.next/static
          cd .next/standalone
          zip -r ../../standalone-deploy.zip .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@2e64e04aaaeeec4396edcb982544dbd30f8e9ddf # v3
        with:
          app-name: 'vnext-badminton-app'
          slot-name: 'Production'
          package: standalone-deploy.zip
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_C63C5B445B514543BFF5CFA2959ABBD0 }}
