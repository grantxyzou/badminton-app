# Grouped Dependabot so updates arrive as a few predictable PRs per week
# instead of a flood of single-package PRs (each of which can desync the
# lockfile on squash-merge). Majors still come individually — they
# deserve individual review. Commit prefixes match the repo convention.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      production-deps:
        applies-to: version-updates
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      development-deps:
        applies-to: version-updates
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      security-updates:
        applies-to: security-updates
        patterns:
          - "*"
    ignore:
      # eslint-config-next 16 targets ESLint 9 (peer `>=9`), and its bundled
      # eslint-plugin-react crashes on ESLint 10 (`getFilename` was removed) —
      # the exact bump that silently broke the whole lint toolchain. Hold ESLint
      # on 9.x (minors/patches still flow) until eslint-config-next ships ESLint
      # 10 support; revisit then. (audit WS#4, 2026-06-03)
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      # The following majors are deliberate migrations, not auto-merges — held
      # so Dependabot stops re-proposing them weekly. Minor/patch still flow.
      # Revisit each on its own branch when there's appetite. (2026-06-03)
      # Tailwind 4 is a ground-up rewrite (CSS-first config, breaking
      # tailwind.config.js + utility changes).
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
      # @types/node should track the runtime (CI/Azure run Node 22), not jump
      # ahead to Node 25 types.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      # TypeScript 6 would churn types right after the eslint/TS toolchain was
      # stabilized on ESLint 9; TS 5.x is fine until a deliberate TS 6 pass.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
